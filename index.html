  header { margin: 0; padding: 0; background: none; line-height: 0; }
  header::before { display: none; }
  .trophy { font-size: 3rem; margin-bottom: 0.5rem; position: relative; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5rem); letter-spacing: 0.05em; color: var(--gold); line-height: 1; position: relative; }
  header p { color: rgba(248,248,244,0.6); font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.5rem; position: relative; }

  .live-indicator { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 99px; padding: 0.3rem 0.75rem; font-size: 0.72rem; color: #f87171; font-weight: 600; margin-top: 0.75rem; position: relative; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* API BANNER */
  #api-banner {
    background: rgba(245,200,66,0.08); border-bottom: 1px solid rgba(245,200,66,0.15);
    padding: 0.6rem 1rem; text-align: center; font-size: 0.75rem; color: var(--grey);
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  #api-banner a { color: var(--gold); text-decoration: none; }
  #api-status { font-weight: 600; }
  .status-ok { color: #6ee7b7; }
  .status-err { color: #f87171; }
  .status-loading { color: var(--gold); }

  .filters {
    display: flex; gap: 0.5rem; padding: 1.25rem 1rem; overflow-x: auto; scrollbar-width: none;
    position: sticky; top: 0; z-index: 10; background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; padding: 0.45rem 1.1rem; border-radius: 99px; background: var(--pill-bg); color: var(--grey); font-size: 0.78rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.18s; white-space: nowrap; }
  .pill:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }
  .pill.active { background: var(--gold); color: var(--dark); font-weight: 600; }

  main { padding: 1rem; max-width: 680px; margin: 0 auto; }

  .day-block { margin-bottom: 2rem; }
  .day-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.08em; color: var(--gold); padding: 0.5rem 0 0.75rem; border-bottom: 1px solid rgba(245,200,66,0.2); margin-bottom: 0.75rem; }

  .match {
    background: var(--card-bg); border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 0.5rem;
    display: grid; grid-template-columns: 3.5rem 1fr auto; gap: 0.5rem; align-items: center;
    border: 1px solid rgba(255,255,255,0.05); transition: border-color 0.15s; position: relative; overflow: hidden;
  }
  .match:hover { border-color: rgba(245,200,66,0.25); }
  .match.portugal { border-color: rgba(245,200,66,0.4); background: linear-gradient(135deg, #1e3d20 0%, var(--card-bg) 60%); }
  .match.live-match { border-color: rgba(239,68,68,0.4); animation: live-border 2s infinite; }
  @keyframes live-border { 0%, 100% { border-color: rgba(239,68,68,0.4); } 50% { border-color: rgba(239,68,68,0.8); } }

  .match-time { text-align: center; }
  .match-time .hour { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--gold); line-height: 1; }
  .match-time .group-tag { font-size: 0.6rem; color: var(--grey); text-transform: uppercase; letter-spacing: 0.05em; }
  .match-time .live-tag { font-size: 0.6rem; color: var(--live); font-weight: 700; animation: pulse 1.5s infinite; }

  .match-teams { display: flex; flex-direction: column; gap: 0.2rem; }
  .teams-row { font-size: 0.92rem; font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 0.5rem; }
  .score { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold); min-width: 2.5rem; text-align: center; }
  .score.live { color: var(--live); }
  .city-row { font-size: 0.72rem; color: var(--grey); }
  .flag { font-size: 1rem; }

  .match-right { display: flex; flex-direction: column; gap: 0.25rem; align-items: flex-end; }
  .tv-badge { font-size: 0.62rem; font-weight: 600; padding: 0.2rem 0.45rem; border-radius: 4px; white-space: nowrap; }
  .tv-rtp { background: rgba(220,50,50,0.25); color: #f87171; }
  .tv-sic { background: rgba(255,160,0,0.2); color: #fbbf24; }
  .tv-tvi { background: rgba(100,180,255,0.15); color: #93c5fd; }
  .tv-sptv { background: rgba(100,255,150,0.1); color: #6ee7b7; }
  .tv-lv { background: rgba(200,200,200,0.1); color: #d1d5db; }
  .pt-flag { position: absolute; right: 0.7rem; top: 0.5rem; font-size: 0.9rem; opacity: 0.7; }

  .result-badge { font-size: 0.6rem; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 3px; }
  .result-ft { background: rgba(255,255,255,0.08); color: var(--grey); }
  .result-live { background: rgba(239,68,68,0.2); color: #f87171; }

  .standings-grid { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
  .group-table { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
  .group-header { background: rgba(245,200,66,0.1); padding: 0.6rem 1rem; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--gold); }
  .table-row { display: grid; grid-template-columns: 1.5rem 1fr 2rem 2rem 2rem 2rem 2.5rem; gap: 0.25rem; padding: 0.5rem 1rem; align-items: center; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .table-row:last-child { border-bottom: none; }
  .table-row.header { color: var(--grey); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; background: rgba(255,255,255,0.03); }
  .table-row.qualify { border-left: 3px solid var(--gold); }
  .pos { color: var(--grey); font-weight: 600; }
  .team-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pts { font-weight: 700; color: var(--gold); text-align: right; }
  .num { text-align: right; color: var(--grey); }

  .knockout-section { background: var(--card-bg); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid rgba(245,200,66,0.15); }
  .knockout-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 0.75rem; }
  .ko-match { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; gap: 1rem; }
  .ko-match:last-child { border-bottom: none; }
  .ko-date { color: var(--gold); font-weight: 600; min-width: 70px; }
  .ko-info { color: var(--grey); flex: 1; }
  .ko-city { color: rgba(248,248,244,0.4); font-size: 0.72rem; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--grey); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(245,200,66,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated { text-align: center; font-size: 0.7rem; color: var(--grey); padding: 0.5rem; opacity: 0.6; }
  /* TV LEGEND */

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentFilter = 'todos';
let apiMatches = null; // filled when API responds
let apiStandings = null;
let apiError = false;

const TODAY_PT = (() => {
  const d = new Date();
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
})();

// ═══════════════════════════════════════════
//  API  (TheSportsDB via Netlify function)
// ═══════════════════════════════════════════
let liveScores = {};

async function loadFromAPI() {
  const statusEl = document.getElementById('api-status');
  if (statusEl) { statusEl.className = 'status-loading'; statusEl.textContent = 'A ligar...'; }
  try {
    const res = await fetch('/.netlify/functions/scores');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    liveScores = {};
    (data.matches || []).forEach(m => {
      const key = (m.homeTeam + ' vs ' + m.awayTeam).toLowerCase();
      liveScores[key] = { home: m.homeScore, away: m.awayScore, status: m.status };
    });
    const count = data.count || 0;
    if (statusEl) {
      statusEl.className = 'status-ok';
      statusEl.textContent = count > 0 ? '✅ ' + count + ' jogo(s)' : '✅ Atualizado';
    }
  } catch(e) {
    if (statusEl) { statusEl.className = 'status-err'; statusEl.textContent = '❌ Erro'; }
    console.warn('API error:', e);
  }
  render();
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function tvClass(t) {
  if (t==='RTP1') return 'tv-rtp'; if (t==='SIC') return 'tv-sic';
  if (t==='TVI') return 'tv-tvi'; if (t==='SPTV') return 'tv-sptv';
  return 'tv-lv';
}
function isOpenTV(tvList) { return tvList.some(t => ['RTP1','SIC','TVI'].includes(t)); }

function renderStandings() {
  const table = {};
  LOCAL_MATCHES.forEach(m => {
    const g = m.group;
    if (!table[g]) table[g] = {};
    [m.home, m.away].forEach(t => {
      if (!table[g][t]) table[g][t] = { name: t, j: 0, v: 0, e: 0, d: 0, gm: 0, gs: 0, pts: 0 };
    });
    const key = (m.home + ' vs ' + m.away).toLowerCase();
    const score = liveScores[key];
    if (score && score.home !== null && score.away !== null) {
      const hg = parseInt(score.home) || 0, ag = parseInt(score.away) || 0;
      table[g][m.home].j++; table[g][m.away].j++;
      table[g][m.home].gm += hg; table[g][m.home].gs += ag;
      table[g][m.away].gm += ag; table[g][m.away].gs += hg;
      if (hg > ag) { table[g][m.home].v++; table[g][m.home].pts += 3; table[g][m.away].d++; }
      else if (hg < ag) { table[g][m.away].v++; table[g][m.away].pts += 3; table[g][m.home].d++; }
      else { table[g][m.home].e++; table[g][m.home].pts++; table[g][m.away].e++; table[g][m.away].pts++; }
    }
  });
  const groups = Object.keys(table).sort();
  if (!groups.length) return '<div class="empty"><p>Sem dados disponíveis.</p></div>';
  return groups.map(g => {
    const teams = Object.values(table[g]).sort((a, b) => b.pts - a.pts || (b.gm-b.gs)-(a.gm-a.gs) || b.gm - a.gm);
    const rows = teams.map((t, i) => `<div class="table-row ${i < 2 ? 'qualify' : ''}"><span class="pos">${i+1}</span><span class="team-name">${t.name}</span><span class="num">${t.j}</span><span class="num">${t.v}</span><span class="num">${t.e}</span><span class="num">${t.d}</span><span class="pts">${t.pts}</span></div>`).join('');
    return `<div class="group-table"><div class="group-header">Grupo ${g}</div><div class="table-row header"><span></span><span>Equipa</span><span>J</span><span>V</span><span>E</span><span>D</span><span>Pts</span></div>${rows}</div>`;
  }).join('');
}

function scoreFromAPI(m) {
  const s = m.score;
  if (!s || s.fullTime.home === null) return null;
  const inPlay = ['IN_PLAY','PAUSED','HALF_TIME'].includes(m.status);
  const finished = m.status === 'FINISHED';
  if (!inPlay && !finished) return null;
  return { home: s.fullTime.home ?? s.halfTime.home ?? 0, away: s.fullTime.away ?? s.halfTime.away ?? 0, live: inPlay };
}

function renderMatches() {
  let matches = [...LOCAL_MATCHES];

  // merge API scores
  if (apiMatches) {
    matches = matches.map(lm => {
      const api = apiMatches.find(am =>
        am.homeTeam.name?.toLowerCase().includes(lm.home.toLowerCase().split(' ')[0]) ||
        am.awayTeam.name?.toLowerCase().includes(lm.away.toLowerCase().split(' ')[0])
      );
      if (api) {
        const sc = scoreFromAPI(api);
        if (sc) return { ...lm, score: sc };
      }
      return lm;
    });
  }

  let filtered = matches;
  if (currentFilter === 'portugal') filtered = matches.filter(m => m.portugal);
  if (currentFilter === 'aberto') filtered = matches.filter(m => isOpenTV(m.tv));
  if (currentFilter === 'hoje') filtered = matches.filter(m => m.date === TODAY_PT);

  if (filtered.length === 0) {
    return `<div class="empty">⚽<p>Nenhum jogo encontrado para hoje.</p></div>`;
  }

  const byDate = {};
  filtered.forEach(m => { if (!byDate[m.date]) byDate[m.date] = []; byDate[m.date].push(m); });

  return Object.entries(byDate).map(([date, ms]) => `
    <div class="day-block">
      <div class="day-label">${date}</div>
      ${ms.map(m => {
        const hasScore = m.score;
        const isLive = hasScore && m.score.live;
        return `
        <div class="match ${m.portugal ? 'portugal' : ''} ${isLive ? 'live-match' : ''}">
          ${m.portugal ? '<span class="pt-flag">🇵🇹</span>' : ''}
          <div class="match-time">
            <div class="hour">${isLive ? '🔴' : m.time}</div>
            <div class="${isLive ? 'live-tag' : 'group-tag'}">${isLive ? 'AO VIVO' : 'Gr. '+m.group}</div>
          </div>
          <div class="match-teams">
            <div class="teams-row">
              ${m.home}
              ${hasScore ? `<span class="score ${isLive ? 'live' : ''}">${m.score.home}–${m.score.away}</span>` : '<span style="color:var(--grey);font-weight:400;margin:0 0.3rem">vs</span>'}
              ${m.away}
            </div>
            <div class="city-row">📍 ${m.city} ${hasScore && !isLive ? '· <span style="color:rgba(100,255,150,0.7);font-size:0.65rem">FT</span>' : ''}</div>
          </div>
          <div class="match-right">
            ${m.tv.slice(0,2).map(t => `<span class="tv-badge ${tvClass(t)}">${t}</span>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderKnockout() {
  return KNOCKOUT.map(s => `
    <div class="knockout-section">
      <div class="knockout-title">${s.phase}</div>
      ${s.matches.map(m => `
        <div class="ko-match">
          <span class="ko-date">${m.date}</span>
          <span class="ko-info">${m.info}</span>
          <span class="ko-city">${m.city}</span>
        </div>`).join('')}
    </div>`).join('');
}

function render() {
  const main = document.getElementById('main');
  if (currentFilter === 'classificacao') { main.innerHTML = renderStandings(); return; }
  if (currentFilter === 'eliminatoria') { main.innerHTML = renderKnockout(); return; }
  main.innerHTML = renderMatches();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render(); // show local data immediately
loadFromAPI(); // then try to enrich with live scores
setInterval(loadFromAPI, 60000); // refresh every 60s
</script>
